<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cours</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gradient-to-br from-blue-50 via-white to-blue-100 min-h-screen">

<!-- ROLE -->
<script>
    const role = "prof"; // ⚠️ mets "eleve" ou "prof"
</script>

<header class="bg-white shadow p-4 flex justify-between">
    <h1 class="text-blue-600 font-bold">📚 Cours</h1>

    <button id="addBtn" class="bg-blue-600 text-white px-4 py-2 rounded hidden">
        + Ajouter un cours
    </button>
</header>

<main class="p-6 grid gap-6 md:grid-cols-3">

    <!-- CARD 1 -->
    <div class="bg-white p-5 rounded shadow">

        <h2 class="font-bold">Réseaux</h2>
        <p class="text-gray-500">Intro aux réseaux</p>

        <div class="flex justify-between mt-4">
            <a href="lecon.html" class="text-blue-600">Ouvrir →</a>

            <div class="actions flex gap-2"></div>
        </div>

    </div>

    <!-- CARD 2 -->
    <div class="bg-white p-5 rounded shadow">

        <h2 class="font-bold">Java</h2>
        <p class="text-gray-500">POO Java</p>

        <div class="flex justify-between mt-4">
            <a href="lecon.html" class="text-blue-600">Ouvrir →</a>

            <div class="actions flex gap-2"></div>
        </div>

    </div>

    <!-- CARD 3 -->
    <div class="bg-white p-5 rounded shadow">

        <h2 class="font-bold">Base de données</h2>
        <p class="text-gray-500">SQL</p>

        <div class="flex justify-between mt-4">
            <a href="lecon.html" class="text-blue-600">Ouvrir →</a>

            <div class="actions flex gap-2"></div>
        </div>

    </div>

</main>

<script>
document.addEventListener("DOMContentLoaded", function () {

    const actions = document.querySelectorAll(".actions");
    const addBtn = document.getElementById("addBtn");

    console.log("ROLE =", role); // 👀 debug

    if (role === "prof") {

        // afficher bouton ajouter
        addBtn.classList.remove("hidden");

        // ajouter boutons sur chaque cours
        actions.forEach(el => {
            el.innerHTML = `
                <button class="text-green-600 text-sm">Modifier</button>
                <button class="text-red-600 text-sm">Supprimer</button>
            `;
        });

    } else {
        actions.forEach(el => {
            el.innerHTML = "";
        });
    }

});
</script>

</body>
</html>
