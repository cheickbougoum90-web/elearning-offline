<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notation du cours</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gradient-to-br from-blue-50 via-white to-blue-100 min-h-screen">

<header class="bg-white shadow-sm">

<div class="max-w-5xl mx-auto p-4">
<h1 class="text-xl font-bold text-blue-600">
⭐ Évaluation du cours
</h1>
</div>

</header>

<main class="max-w-3xl mx-auto p-6">

<div class="bg-white rounded-2xl shadow p-8">

<h2 class="text-2xl font-bold mb-6">
Comment avez-vous trouvé ce cours ?
</h2>

<div class="flex justify-center text-5xl gap-3 mb-8">

<span class="cursor-pointer">⭐</span>
<span class="cursor-pointer">⭐</span>
<span class="cursor-pointer">⭐</span>
<span class="cursor-pointer">⭐</span>
<span class="cursor-pointer">⭐</span>

</div>

<textarea
class="w-full border rounded-xl p-4"
rows="5"
placeholder="Votre commentaire..."
></textarea>

<button
class="mt-6 bg-blue-600 text-white px-6 py-3 rounded-xl hover:bg-blue-700">

Envoyer l'évaluation

</button>

</div>

</main>

</body>
</html>
