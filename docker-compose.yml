services:

  # ── BASE DE DONNÉES ──────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: elearning_postgres
    restart: always
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - elearning_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── CACHE ────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: elearning_redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - elearning_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── BACKEND ──────────────────────────────────────────
  backend:
    build: ./backend
    container_name: elearning_backend
    restart: always
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - media_data:/app/media
    networks:
      - elearning_network

  # ── FRONTEND ─────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: elearning_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - elearning_network

volumes:
  postgres_data:
  media_data:

networks:
  elearning_network:
    driver: bridge
