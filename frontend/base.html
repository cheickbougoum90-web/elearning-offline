<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-learning Offline</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-gray-100 flex flex-col min-h-screen">

    <!-- HEADER -->
    <header class="bg-blue-600 text-white shadow-md">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-xl font-bold">
                E-learning Offline
            </h1>

            <span class="text-sm">
                Plateforme éducative
            </span>
        </div>
    </header>

    <!-- NAVIGATION -->
    <nav class="bg-white shadow">
        <div class="max-w-6xl mx-auto px-4">
            <ul class="flex gap-6 py-3 text-blue-600 font-medium">
                <li><a href="#" class="hover:text-blue-800">Accueil</a></li>
                <li><a href="#" class="hover:text-blue-800">Cours</a></li>
                <li><a href="#" class="hover:text-blue-800">Quiz</a></li>
                <li><a href="#" class="hover:text-blue-800">Dashboard</a></li>
            </ul>
        </div>
    </nav>

    <!-- MAIN CONTENT -->
    <main class="flex-1 max-w-6xl mx-auto px-4 py-8">

        <section class="bg-white p-6 rounded-lg shadow">
            <h2 class="text-2xl font-semibold text-gray-800 mb-4">
                Bienvenue sur la plateforme
            </h2>

            <p class="text-gray-600">
                Ceci est le template de base du projet e-learning offline.
            </p>
        </section>

    </main>

    <!-- FOOTER -->
    <footer class="bg-gray-800 text-white text-center py-4 mt-auto">
        <p>© 2026 - E-learning Offline</p>
    </footer>

</body>
</html>
